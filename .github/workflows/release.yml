name: Build and Release CRX

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0) — leave blank to read from manifest.json"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(jq -r '.version' manifest.json)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Check tag doesn't already exist
        run: |
          TAG=${{ steps.version.outputs.tag }}
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Error: Tag $TAG already exists"
            exit 1
          fi

      - name: Update manifest version
        if: ${{ github.event.inputs.version != '' }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          echo "Updated manifest.json to version $VERSION"

      - name: Commit version bump
        if: ${{ github.event.inputs.version != '' }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Release v${VERSION}"
          git push

      - name: Get commit log since last tag
        id: changelog
        run: |
          # Find the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "Previous tag: $PREV_TAG"
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" -- . ':!.github')
          else
            echo "No previous tag, using full log"
            LOG=$(git log --pretty=format:"- %s (%h)" -- . ':!.github')
          fi
          # Write to file to handle multiline
          echo "$LOG" > /tmp/changelog.txt
          echo "Generated changelog with $(echo "$LOG" | wc -l) entries"

      - name: Create git tag
        run: |
          TAG=${{ steps.version.outputs.tag }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Generate signing key
        run: openssl genrsa -out key.pem 2048

      - name: Build CRX and ZIP
        run: |
          npm install -g crx3
          VERSION=${{ steps.version.outputs.version }}

          mkdir -p dist ext

          cp manifest.json ext/
          cp LICENSE ext/
          cp -r icons ext/
          cp -r src ext/

          crx3 ext \
            --keyPath key.pem \
            --crxPath dist/fingerprint-detector-${VERSION}.crx

          cd ext
          zip -r ../dist/fingerprint-detector-${VERSION}.zip . \
            -x "*.DS_Store"

      - name: Create release with changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAG=${{ steps.version.outputs.tag }}
          CHANGELOG=$(cat /tmp/changelog.txt)

          gh release create "$TAG" \
            --title "Fingerprint Detector $TAG" \
            --notes "## Changes since last release

          ${CHANGELOG}

          ## Install

          - **fingerprint-detector-${VERSION}.crx** — drag into \`chrome://extensions\` to install
          - **fingerprint-detector-${VERSION}.zip** — unzip and load unpacked via Developer mode" \
            dist/fingerprint-detector-${VERSION}.crx \
            dist/fingerprint-detector-${VERSION}.zip
