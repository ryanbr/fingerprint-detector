name: Build and Release CRX

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0) — leave blank to read from manifest.json"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(jq -r '.version' manifest.json)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Update manifest version
        if: ${{ github.event.inputs.version != '' }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          echo "Updated manifest.json to version $VERSION"

      - name: Generate signing key
        run: openssl genrsa -out key.pem 2048

      - name: Build CRX and ZIP
        run: |
          npm install -g crx3
          VERSION=${{ steps.version.outputs.version }}

          mkdir -p dist

          zip -r dist/fingerprint-detector-${VERSION}.zip \
            manifest.json \
            icons/ \
            src/ \
            LICENSE \
            -x "*.DS_Store" "*.map"

          crx3 dist/fingerprint-detector-${VERSION}.zip \
            --keyPath key.pem \
            --crxPath dist/fingerprint-detector-${VERSION}.crx

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAG=${{ steps.version.outputs.tag }}

          gh release create "$TAG" \
            --title "Fingerprint Detector $TAG" \
            --generate-notes \
            dist/fingerprint-detector-${VERSION}.crx \
            dist/fingerprint-detector-${VERSION}.zip
