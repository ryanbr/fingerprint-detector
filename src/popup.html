<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* ── Theme: dark (default) ───────────────────────────── */
    :root {
      --bg: #1a1a2e;
      --panel: #16213e;
      --panel-deep: #12122a;
      --border: #0f3460;
      --border-soft: #0f346030;
      --border-faint: #0f346033;
      --text: #e0e0e0;
      --text-dim: #b0bec5;
      --text-mute: #90a4ae;
      --text-faint: #78909c;
      --text-fainter: #546e7a;
      --accent: #e94560;
      --high: #ef5350;
      --medium: #ffa726;
      --low: #66bb6a;
      --link: #5c6bc0;
      --iframe: #ab47bc;
      --iframe-text: #ce93d8;
      --iframe-bg: #ab47bc33;
      --high-bg: #e5393533;
      --medium-bg: #fb8c0033;
      --low-bg: #43a04733;
      --none-bg: #78909c33;
      --accent-bg-soft: #e9456018;
      --accent-bg: #e9456033;
      --shadow: #00000066;
    }
    /* ── Theme: light ────────────────────────────────────── */
    body.light {
      --bg: #f5f5f8;
      --panel: #ffffff;
      --panel-deep: #e8eaf0;
      --border: #b0b8c4;
      --border-soft: #b0b8c460;
      --border-faint: #b0b8c466;
      --text: #1a1a2e;
      --text-dim: #3a4254;
      --text-mute: #5a6478;
      --text-faint: #6a7488;
      --text-fainter: #889098;
      --accent: #c62147;
      --high: #d32f2f;
      --medium: #ed6c02;
      --low: #2e7d32;
      --link: #3949ab;
      --iframe: #7b1fa2;
      --iframe-text: #4a148c;
      --iframe-bg: #7b1fa226;
      --high-bg: #d32f2f22;
      --medium-bg: #ed6c0222;
      --low-bg: #2e7d3222;
      --none-bg: #5a647822;
      --accent-bg-soft: #c6214712;
      --accent-bg: #c6214722;
      --shadow: #00000033;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 480px;
      height: 520px;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
    }
    code, .mono {
      font-family: Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      padding: 12px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 600; color: var(--accent); }

    /* ── Tabs ────────────────────────────────────────── */
    .tabs {
      display: flex;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 9px 0;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-faint);
      border-bottom: 2px solid transparent;
      user-select: none;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--text-dim); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Panels ──────────────────────────────────────── */
    .panel { display: none; flex: 1; overflow-y: auto; }
    .panel.active { display: flex; flex-direction: column; }

    /* ── Summary panel ───────────────────────────────── */
    .summary {
      padding: 12px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.high   { background: var(--high-bg); color: var(--high); }
    .badge.medium { background: var(--medium-bg); color: var(--medium); }
    .badge.low    { background: var(--low-bg); color: var(--low); }
    .badge.none   { background: var(--none-bg); color: var(--text-mute); }

    .empty {
      padding: 40px 16px;
      text-align: center;
      color: var(--text-faint);
      flex: 1;
    }
    .empty svg { margin-bottom: 12px; opacity: 0.4; }

    .category { border-bottom: 1px solid var(--border); }
    .category-header {
      padding: 10px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      user-select: none;
    }
    .category-header:hover { background: var(--panel); }
    .category-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 13px;
    }
    .category-icon {
      width: 20px; height: 20px;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; flex-shrink: 0;
    }
    .count {
      background: var(--border); color: var(--text-mute);
      padding: 2px 8px; border-radius: 10px; font-size: 11px;
    }
    .category-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .summary-mute-btn {
      visibility: hidden;
      background: none;
      border: none;
      color: var(--text-fainter);
      font-size: 13px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }
    .category-header:hover .summary-mute-btn { visibility: visible; }
    .detection:hover .summary-mute-btn { visibility: visible; }
    .summary-mute-btn:hover { color: var(--high); }
    .summary-mute-btn.is-muted { visibility: visible; color: var(--high); }
    .category.is-muted .category-header { opacity: 0.4; }
    .detection.is-muted { opacity: 0.4; }
    .arrow { transition: transform 0.2s; color: var(--text-fainter); }
    .category.open .arrow { transform: rotate(90deg); }
    .category-body { display: none; padding: 0 16px 10px; }
    .category.open .category-body { display: block; }

    .detection {
      padding: 6px 0;
      border-bottom: 1px solid var(--border-faint);
      font-size: 12px;
    }
    .detection:last-child { border-bottom: none; }
    .detection .method {
      color: var(--accent);
      font-family: Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
      font-size: 11px;
    }
    .detection .detail {
      color: var(--text-faint); font-size: 11px;
      margin-top: 2px; word-break: break-all;
    }
    .detection .source {
      color: var(--link); font-size: 10px;
      margin-top: 2px; word-break: break-all;
      font-family: Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
    }
    .detection .frame-url {
      color: var(--iframe); font-size: 10px;
      margin-top: 1px; word-break: break-all;
      font-family: Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
    }
    .iframe-tag {
      display: inline-block;
      background: var(--iframe-bg);
      color: var(--iframe-text);
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .detection .time {
      color: var(--text-fainter); font-size: 10px; float: right;
    }

    /* ── Trackers panel ─────────────────────────────── */
    .tracker-card {
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
    }
    .tracker-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 13px;
    }
    .tracker-card-icon {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .tracker-card-name { flex: 1; }
    .tracker-card-count {
      background: var(--border); color: var(--text-mute);
      padding: 2px 8px; border-radius: 10px; font-size: 11px;
      font-weight: 600;
    }
    .tracker-signals {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .tracker-signal {
      display: flex;
      gap: 6px;
      font-size: 11px;
      line-height: 1.4;
      padding: 3px 8px;
      background: var(--panel-deep);
      border-radius: 3px;
    }
    .tracker-signal-method {
      color: var(--text-mute);
      font-weight: 600;
      flex-shrink: 0;
      max-width: 40%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tracker-signal-detail {
      color: var(--accent);
      font-family: Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Debug Log panel ─────────────────────────────── */
    .log-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .log-toolbar input {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      font-size: 11px;
      outline: none;
    }
    .log-toolbar input::placeholder { color: var(--text-fainter); }
    .log-toolbar input:focus { border-color: var(--accent); }
    .log-toolbar button {
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text-mute);
      font-size: 11px;
      cursor: pointer;
    }
    .log-toolbar button:hover { background: var(--border); color: var(--text); }
    .log-toolbar button.paused {
      background: var(--accent-bg);
      color: var(--high);
      border-color: var(--accent);
    }

    /* ── Mute controls ──────────────────────────────── */
    .mute-btn {
      visibility: hidden;
      background: none;
      border: none;
      color: var(--text-fainter);
      font-size: 12px;
      cursor: pointer;
      padding: 0 4px;
      flex-shrink: 0;
      line-height: 1;
    }
    .log-entry:hover .mute-btn { visibility: visible; }
    .mute-btn:hover { color: var(--high); }

    .mute-bar {
      display: none;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px 12px;
      background: var(--panel-deep);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .mute-bar.active { display: flex; }
    .mute-bar-label {
      font-size: 10px;
      color: var(--text-fainter);
      align-self: center;
      margin-right: 4px;
    }
    .mute-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 10px;
      font-family: Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
      background: var(--accent-bg-soft);
      color: var(--high);
      cursor: pointer;
      border: 1px solid var(--accent-bg);
    }
    .mute-tag:hover {
      background: var(--accent-bg);
      border-color: var(--accent);
    }
    .mute-tag .x {
      font-weight: 700;
      font-size: 11px;
    }
    .log-counter {
      font-size: 11px; color: var(--text-fainter); white-space: nowrap;
    }
    #log-autoscroll-label {
      font-size: 11px;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      cursor: pointer;
    }

    #log-list {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }
    .log-entry {
      border-bottom: 1px solid var(--border-soft);
      font-size: 12px;
      line-height: 1.5;
      padding: 4px 0;
      animation: logFlash 0.4s ease-out;
    }
    @keyframes logFlash {
      from { background: var(--accent-bg-soft); }
      to   { background: transparent; }
    }
    .log-entry:hover { background: var(--panel); }
    .log-row {
      display: flex;
      gap: 0;
      align-items: baseline;
    }
    .log-ts {
      min-width: 78px;
      max-width: 78px;
      flex-shrink: 0;
      color: var(--text-fainter);
      padding: 0 6px;
      font-family: Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
      font-size: 11px;
      box-sizing: border-box;
    }
    .log-cat {
      min-width: 110px;
      max-width: 110px;
      flex-shrink: 0;
      font-weight: 600;
      padding: 0 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      box-sizing: border-box;
    }
    .log-method {
      flex: 1;
      min-width: 0;
      color: var(--accent);
      font-family: Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
      padding: 0 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .log-detail {
      padding: 0 8px 0 4px;
      color: var(--text-faint);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .log-source {
      padding: 0 8px 0 84px;
      font-size: 11px;
      color: var(--link);
      font-family: Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .log-frame {
      padding: 0 8px 0 84px;
      font-size: 11px;
      color: var(--iframe);
      font-family: Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .log-entry.expanded .log-stack-row { display: block; }
    .log-stack-row {
      display: none;
      padding: 4px 8px 4px 84px;
      font-size: 11px;
      color: var(--text-fainter);
      font-family: Consolas, "Liberation Mono", Menlo, "Courier New", monospace;
      white-space: pre-wrap;
      word-break: break-all;
      border-bottom: 1px solid var(--border-soft);
      background: var(--panel-deep);
    }

    /* risk colors for log category */
    .risk-high   { color: var(--high); }
    .risk-medium { color: var(--medium); }
    .risk-low    { color: var(--low); }

    /* ── Export dropdown ─────────────────────────────── */
    .export-wrap {
      position: relative;
    }
    #compare-btn {
      margin-left: auto;
    }
    .export-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-faint);
      font-size: 11px;
      padding: 4px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .export-btn:hover { background: var(--border); color: var(--text); }
    .theme-btn { padding: 4px 6px; }
    .export-menu {
      display: none;
      position: absolute;
      right: 0;
      top: 100%;
      margin-top: 4px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      z-index: 10;
      min-width: 180px;
      box-shadow: 0 4px 12px var(--shadow);
    }
    .export-menu.open { display: block; }
    .export-item {
      display: block;
      width: 100%;
      padding: 8px 12px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 11px;
      text-align: left;
      cursor: pointer;
    }
    .export-item:hover { background: var(--border); }
    .export-item .export-desc {
      display: block;
      font-size: 9px;
      color: var(--text-fainter);
      margin-top: 2px;
    }

    /* ── Footer ──────────────────────────────────────── */
    footer {
      padding: 8px 16px;
      text-align: center;
      font-size: 10px;
      color: var(--text-fainter);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <h1>Fingerprint Detector</h1>
    <button class="export-btn theme-btn" id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme">
      <svg id="theme-icon-dark" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg id="theme-icon-light" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
    <button class="export-btn" id="compare-btn" title="Compare with another site">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 00-2 2v14a2 2 0 002 2h3"/>
        <path d="M16 3h3a2 2 0 012 2v14a2 2 0 01-2 2h-3"/>
        <line x1="12" y1="20" x2="12" y2="10"/>
        <polyline points="9 13 12 10 15 13"/>
      </svg>
      Compare
    </button>
    <div class="export-wrap">
      <button class="export-btn" id="export-toggle">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export
      </button>
      <div class="export-menu" id="export-menu">
        <button class="export-item" id="export-summary-json">
          Summary (JSON)
          <span class="export-desc">Categories, risk levels, unique detections</span>
        </button>
        <button class="export-item" id="export-trackers-json">
          Trackers (JSON)
          <span class="export-desc">Detected tracking libraries with their signals</span>
        </button>
        <button class="export-item" id="export-trackers-csv">
          Trackers (CSV)
          <span class="export-desc">Spreadsheet-friendly: tracker, signal type, value</span>
        </button>
        <button class="export-item" id="export-log-json">
          Debug Log (JSON)
          <span class="export-desc">Full event log with timestamps and stacks</span>
        </button>
        <button class="export-item" id="export-log-csv">
          Debug Log (CSV)
          <span class="export-desc">Spreadsheet-friendly: time, category, method, detail, source</span>
        </button>
        <button class="export-item" id="export-all-json">
          Full Report (JSON)
          <span class="export-desc">Summary + debug log combined</span>
        </button>
      </div>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" data-panel="summary-panel">Summary</div>
    <div class="tab" data-panel="trackers-panel">Trackers</div>
    <div class="tab" data-panel="log-panel">Debug Log</div>
  </div>

  <!-- Summary Panel -->
  <div id="summary-panel" class="panel active">
    <div id="content">
      <div class="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 15s1.5 2 4 2 4-2 4-2"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
        <p>No fingerprinting detected on this page.</p>
      </div>
    </div>
  </div>

  <!-- Trackers Panel -->
  <div id="trackers-panel" class="panel">
    <div id="trackers-content">
      <div class="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 15s1.5 2 4 2 4-2 4-2"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
        <p>No tracking libraries detected on this page.</p>
      </div>
    </div>
  </div>

  <!-- Debug Log Panel -->
  <div id="log-panel" class="panel">
    <div class="log-toolbar">
      <input type="text" id="log-filter" placeholder="Filter by category, method, or detail...">
      <button id="log-pause">Pause</button>
      <label id="log-autoscroll-label">
        <input type="checkbox" id="log-autoscroll" checked> Auto
      </label>
      <span class="log-counter" id="log-counter">0 events</span>
      <button id="log-clear">Clear</button>
    </div>
    <div class="mute-bar" id="mute-bar">
      <span class="mute-bar-label">Muted:</span>
    </div>
    <div id="log-list"></div>
  </div>

  <footer id="footer">Fingerprint Detector</footer>
  <script src="popup.js"></script>
</body>
</html>
